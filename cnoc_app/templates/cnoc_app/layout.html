{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CNOC{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'cnoc_app/css/bootstrap/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'cnoc_app/css/estilo.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    {% include 'cnoc_app/navbar.html' %}

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'cnoc_app/js/bootstrap.bundle.min.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
